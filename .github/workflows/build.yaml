name: Build and push

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/bloomerab/gittan-runner

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: BloomerAB/gittan-types
          path: types
      - run: ln -s $GITHUB_WORKSPACE/types ../types
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: cd types && pnpm install --frozen-lockfile && pnpm build
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: BloomerAB/gittan-types
          path: types
      - run: ln -s $GITHUB_WORKSPACE/types ../types
      - run: cd types && corepack enable && pnpm install --frozen-lockfile && pnpm build

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        run: echo "tag=$(date -u +%Y%m%d-%H%M%S)-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - uses: docker/build-push-action@v7
        with:
          push: true
          context: .
          tags: ${{ env.IMAGE }}:${{ steps.meta.outputs.tag }}
          platforms: linux/arm64
